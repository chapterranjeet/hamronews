<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HamroNews | हाम्रो न्यूज</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Nepali&family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-inner">
      <span id="live-date"></span>
      <span class="ticker-wrap">
        <span class="ticker-label">ताजा समाचार:</span>
        <span class="ticker-text" id="ticker"></span>
      </span>
      <a href="login.html" class="admin-link">Admin ▸</a>
    </div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-np">हाम्रो</span>
        <span class="logo-en">NEWS</span>
        <span class="logo-tagline">नेपालको आफ्नै समाचार</span>
      </div>
      <nav class="main-nav">
        <a href="#" class="nav-link active" data-cat="all">सबै</a>
        <a href="#" class="nav-link" data-cat="राजनीति">राजनीति</a>
        <a href="#" class="nav-link" data-cat="अर्थ">अर्थ</a>
        <a href="#" class="nav-link" data-cat="खेलकुद">खेलकुद</a>
        <a href="#" class="nav-link" data-cat="प्रविधि">प्रविधि</a>
        <a href="#" class="nav-link" data-cat="मनोरञ्जन">मनोरञ्जन</a>
        <a href="#" class="nav-link" data-cat="स्वास्थ्य">स्वास्थ्य</a>
      </nav>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero-section">
    <div class="hero-inner" id="hero-area">
      <div class="hero-loading">समाचार लोड हुँदैछ...</div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main-container">

    <!-- BREAKING NEWS STRIP -->
    <div class="breaking-strip" id="breaking-strip" style="display:none;">
      <span class="breaking-label">🔴 BREAKING</span>
      <span class="breaking-text" id="breaking-text"></span>
    </div>

    <!-- GRID SECTION -->
    <section class="news-section">
      <div class="section-header">
        <h2 class="section-title">ताजा समाचारहरू</h2>
        <div class="section-line"></div>
      </div>
      <div class="news-grid" id="news-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>समाचार लोड हुँदैछ...</p>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <span class="logo-np">हाम्रो</span><span class="logo-en">NEWS</span>
      </div>
      <p class="footer-tagline">नेपालको विश्वसनीय समाचार स्रोत</p>
      <p class="footer-copy">© 2025 HamroNews. सर्वाधिकार सुरक्षित।</p>
    </div>
  </footer>

  <!-- ARTICLE MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="main.js"></script>
</body>
</html>
